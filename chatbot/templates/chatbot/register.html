<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PauliBot</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --spus-green: #0A4D2E;
            --spus-green-dark: #083d25;
            --spus-gold: #D4AF37;
            --text-dark: #333333;
            --bg-light: #F8F9FA;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, rgba(10, 77, 46, 0.05) 0%, rgba(212, 175, 55, 0.1) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background-color: var(--spus-green);
            color: var(--white);
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-family: 'Merriweather', serif;
            font-size: 1.8em;
            margin-bottom: 5px;
            color: var(--spus-gold);
        }

        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--spus-green);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--spus-green);
            color: var(--white);
        }

        .btn-primary:hover {
            background-color: var(--spus-green-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--spus-green);
            margin-top: 15px;
        }

        .btn-secondary:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fff5f5;
            color: #c53030;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 3px solid #c53030;
            font-size: 0.9em;
        }

        .help-text {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }

        /* ========== ANIMATIONS ========== */

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-4px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(4px);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Container entrance */
        .container {
            animation: fadeInUp 0.6s ease-out;
        }

        /* Error message shake */
        .error-message {
            animation: shake 0.5s ease-in-out;
        }

        /* Input focus glow */
        input:focus {
            box-shadow: 0 0 0 3px rgba(10, 77, 46, 0.1);
        }

        /* Submit button loading state */
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.7;
            position: relative;
        }

        .btn-primary.loading::after {
            content: '';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Create Account</h1>
            <p>Join the Paulinian Community</p>
        </div>

        <div class="content">
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{% url 'register_page' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="student_id">Student ID</label>
                    <input type="text" id="student_id" name="student_id" required placeholder="e.g., 2024-00001">
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                    <div class="help-text">Must be at least 8 characters long</div>
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>
                <a href="{% url 'landing' %}" class="btn btn-secondary">Already have an account? Login</a>
            </form>
        </div>
    </div>
</body>

</html>
